<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Chatbot AI menggunakan Gemini Flash API" />
    <title>Gemini AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <span class="logo-icon"><i class="ti ti-sparkles"></i></span>
            <span class="logo-text">Delgem Chat</span>
          </div>
        </div>

        <nav class="room-list">
          <button class="room-item active" data-room="general">
            <span class="room-icon"><i class="ti ti-message-circle"></i></span>
            <div class="room-info">
              <span class="room-name">Chat Umum</span>
              <span class="room-status">Online</span>
            </div>
          </button>

          <button class="room-item" data-room="image">
            <span class="room-icon"><i class="ti ti-photo"></i></span>
            <div class="room-info">
              <span class="room-name">Analisis Gambar</span>
              <span class="room-status">AI siap</span>
            </div>
          </button>

          <button class="room-item" data-room="document">
            <span class="room-icon"><i class="ti ti-file-text"></i></span>
            <div class="room-info">
              <span class="room-name">Ringkasan Dokumen</span>
              <span class="room-status">AI siap</span>
            </div>
          </button>

          <button class="room-item" data-room="audio">
            <span class="room-icon"><i class="ti ti-music"></i></span>
            <div class="room-info">
              <span class="room-name">Transkrip Audio</span>
              <span class="room-status">AI siap</span>
            </div>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="user-profile">
            <div class="avatar">U</div>
            <div class="user-info">
              <span class="user-name">User</span>
              <span class="user-status">Aktif</span>
            </div>
          </div>
        </div>
      </aside>

      <main class="chat-area">
        <header class="chat-header">
          <button class="icon-btn hamburger" id="hamburger" title="Menu" aria-label="Toggle menu">
            <i class="ti ti-menu-2"></i>
          </button>
          <div class="chat-title">
            <span class="chat-icon" id="chat-icon"><i class="ti ti-message-circle"></i></span>
            <div>
              <h2 id="room-title">Chat Umum</h2>
              <p class="chat-subtitle" id="room-subtitle">Tanya apa saja, AI akan menjawab</p>
            </div>
          </div>
          <div class="chat-actions">
            <select id="model-select" class="model-select" title="Pilih model AI">
              <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
              <option value="gemini-3.5-flash-lite">Gemini 3.5 Flash Lite</option>
              <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
              <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash</option>
              <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
              <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
              <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
              <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash 8B</option>
            </select>
            <button class="icon-btn" id="clear-chat" title="Hapus chat">
              <i class="ti ti-trash"></i>
            </button>
          </div>
        </header>

        <div id="chat-box" class="chat-box" role="log" aria-live="polite">
          <div class="welcome-message">
            <div class="welcome-avatar"><i class="ti ti-sparkles"></i></div>
            <div class="welcome-content">
              <h3>Selamat datang di Gemini AI Chatbot!</h3>
              <p>
                Saya adalah asisten AI yang siap membantu Anda. Silakan tanyakan apa saja, dan saya
                akan berusaha memberikan jawaban terbaik.
              </p>
            </div>
          </div>
        </div>

        <form id="chat-form" class="chat-form">
          <input type="file" id="file-input" hidden />
          <button type="button" id="upload-btn" class="icon-btn" title="Upload file">
            <i class="ti ti-upload"></i>
          </button>
          <div class="input-wrapper">
            <div id="file-preview" class="file-preview">
              <div class="file-preview-header">
                <span class="file-name" id="preview-file-name"></span>
                <button
                  type="button"
                  class="file-remove-btn"
                  id="remove-file-btn"
                  aria-label="Hapus file"
                >
                  <i class="ti ti-x"></i>
                </button>
              </div>
              <div class="file-preview-body" id="preview-body">
                <div class="file-thumb">
                  <img id="preview-image" alt="Preview gambar" hidden />
                  <i class="ti file-icon" id="preview-icon" hidden></i>
                </div>
              </div>
            </div>

            <input
              type="text"
              id="user-input"
              placeholder="Ketik pesan Anda..."
              autocomplete="off"
              required
              aria-label="Pesan"
            />
          </div>
          <button type="submit" id="send-btn" class="send-btn">
            <i class="ti ti-send"></i>
            <span>Kirim</span>
          </button>
        </form>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
